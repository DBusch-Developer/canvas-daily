{% extends "base.html" %}
{% block body %}
<h1>Ask my course</h1>
{% if not courses %}
  <p>No courses yet. Add a Canvas connection and run a sync first.</p>
{% else %}
<ul class="course-list">
  {% for c in courses %}
    <li><a href="/courses/{{ c.id }}/ask">{{ c.name }}</a></li>
  {% endfor %}
</ul>
{% endif %}
{% endblock %}
