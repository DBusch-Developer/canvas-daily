<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Canvas Daily{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  {% block layout %}
  <header class="topbar">
    <div class="topbar__inner">
      <a class="topbar__logo" href="/" aria-label="Canvas Daily home">
        <img src="/static/logo.png" alt="Canvas Daily">
      </a>
      <button class="topbar__toggle" type="button" aria-label="Menu"
              aria-expanded="false" aria-controls="primary-nav">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <nav class="topbar__nav" id="primary-nav" aria-label="Primary">
        <a class="navlink" href="/">Dashboard</a>
        <a class="navlink" href="/connections">Account</a>
        {% if ask_course_enabled() %}<a class="navlink" href="/ask">Ask my course</a>{% endif %}
        <form method="post" action="/logout">
          <button class="btn btn--ghost btn--sm" type="submit">Log out</button>
        </form>
      </nav>
    </div>
    <div class="brand-rule" aria-hidden="true"></div>
  </header>
  <main class="shell">
    {% block body %}{% endblock %}
  </main>
  {% endblock %}
  <script src="/static/htmx.min.js"></script>
  <script src="/static/breakdown.js"></script>
  <script src="/static/nav.js"></script>
</body>
</html>
