<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Canvas Daily{% endblock %}</title>
  <style>
    body { font: 16px/1.5 system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { margin-bottom: .25rem; }
    h2 { margin-top: 1.5rem; border-bottom: 1px solid #ddd; padding-bottom: .25rem; }
    a { color: #2563eb; }
    .error { color: #b91c1c; }
    form { display: grid; gap: .5rem; max-width: 360px; }
    input, select, button { padding: .5rem; font: inherit; }
    button { cursor: pointer; }
    .meta { color: #555; font-size: .9rem; }
    pre { background: #f5f5f5; padding: 1rem; border-radius: 6px; white-space: pre-wrap; }
  </style>
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
