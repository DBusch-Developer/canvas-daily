{% extends "base.html" %}
{% block title %}Sign up · Canvas Daily{% endblock %}
{% block body %}
  <div class="auth">
    <h1>Create your account</h1>
    <p class="auth__sub meta">One daily report for every Canvas class.</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form class="card-form" method="post" action="/signup">
      <input name="email" type="email" placeholder="Email" required>
      <input name="password" type="password" placeholder="Password" required>
      <button class="btn btn--primary" type="submit">Create account</button>
    </form>
    <p class="meta auth__alt">Already have an account? <a href="/login">Log in</a>.</p>
  </div>
{% endblock %}
