name: Daily email

# 7:00 AM America/Phoenix (UTC-7) == 14:00 UTC. GitHub schedules run in UTC.
on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch: {}   # lets you send the report on demand (great for testing)

jobs:
  email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install -r requirements.txt
      - name: Send each user their grouped daily report
        run: python -m app.jobs email
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
